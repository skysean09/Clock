<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Fit Flip Clock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        /* 테마별 변수 정의 */
        :root {
            --bg-color: #ffffff;
            --panel-bg: #e3e4e8;
            --text-color: #232323;
            --colon-color: #e3e4e8;
            --date-color: #232323;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --panel-bg: #2b2b2b;
                --text-color: #e3e4e8;
                --colon-color: #2b2b2b;
                --date-color: #e3e4e8;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        /* 메인 컨테이너: 임베드 화면 크기에 꽉 차게 설정하고 크기 감지 컨테이너로 지정 */
        .clock-container {
            width: 95%;
            height: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            container-type: size; /* 부모 크기 기준 계산을 위한 엔진 활성화 */
        }

        /* 시계 래퍼 */
        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2cqw;
            width: 100%;
            height: 70cqh; /* 전체 컨테이너 높이의 70% 고정 */
        }

        /* 플립 박스 개별 단위 */
        .flip-unit {
            position: relative;
            width: 28%;
            height: 100%;
            background-color: var(--panel-bg);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 시계 숫자 텍스트: 패널 높이에 최적화 */
        .time-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 55cqh; /* 패널 높이 기준 55%로 맞춰 절대 안 잘림 */
            color: var(--text-color);
            line-height: 1;
        }

        /* 중앙 구분선 */
        .flip-unit::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--bg-color);
            transform: translateY(-50%);
            z-index: 2;
        }

        /* 콜론(점) 기호 */
        .colon {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 45cqh;
            color: var(--colon-color);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4%;
            height: 100%;
        }

        /* 날짜 및 요일 표시부 */
        .date-display {
            height: 20cqh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 12cqh; /* 컨테이너 전체 높이에 연동 */
            color: var(--date-color);
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="flip-clock">
            <div class="flip-unit"><span class="time-text" id="hours">00</span></div>
            <div class="colon">:</div>
            <div class="flip-unit"><span class="time-text" id="minutes">00</span></div>
            <div class="colon">:</div>
            <div class="flip-unit"><span class="time-text" id="seconds">00</span></div>
        </div>
        <div class="date-display" id="date">0000. 00. 00. SUN</div>
    </div>

    <script>
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const dateEl = document.getElementById('date');

        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

        function updateClock() {
            const now = new Date();

            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const day = days[now.getDay()];

            if (hoursEl.textContent !== hrs) hoursEl.textContent = hrs;
            if (minutesEl.textContent !== mins) minutesEl.textContent = mins;
            if (secondsEl.textContent !== secs) secondsEl.textContent = secs;
            
            const fullDateString = `${year}. ${month}. ${date}. ${day}`;
            if (dateEl.textContent !== fullDateString) dateEl.textContent = fullDateString;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
