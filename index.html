<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Responsive Flip Clock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        /* 테마별 변수 정의 (노션 라이트/다크 모드 완벽 대응) */
        :root {
            --bg-color: #ffffff;
            --panel-bg: #e3e4e8;
            --text-color: #232323;
            --colon-color: #e3e4e8;
            --date-color: #232323;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --panel-bg: #2b2b2b;
                --text-color: #e3e4e8;
                --colon-color: #2b2b2b;
                --date-color: #e3e4e8;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease;
        }

        /* 메인 컨테이너: 창 크기에 맞춰 유동적으로 확장 */
        .clock-container {
            width: 90vw;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 2vw;
        }

        /* 시계 래퍼: 좁은 화면(사이드바) 대응을 위해 wrap 설정 */
        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5vw;
            width: 100%;
            flex-wrap: wrap;
        }

        /* 플립 박스 개별 단위: 창 크기에 비례하는 뷰포트 단위 적용 */
        .flip-unit {
            position: relative;
            width: 22vw;
            height: 26vw;
            max-width: 180px;
            max-height: 220px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 시계 숫자 텍스트: 플립 유닛 크기에 연동 */
        .time-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 14vw;
            color: var(--text-color);
            line-height: 1;
        }

        @media (min-width: 800px) {
            .time-text { font-size: 110px; }
        }

        /* 중앙 구분선: 미니멀 플립 감성 구현 */
        .flip-unit::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--bg-color);
            transform: translateY(-50%);
            z-index: 2;
        }

        /* 콜론(점) 기호 */
        .colon {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 10vw;
            color: var(--colon-color);
            line-height: 1;
            padding-bottom: 2vw;
        }

        @media (min-width: 800px) {
            .colon { font-size: 80px; }
        }

        /* 날짜 및 요일 표시부 */
        .date-display {
            margin-top: 3vw;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.5vw;
            color: var(--date-color);
            letter-spacing: 1px;
            text-align: center;
        }

        @media (min-width: 800px) {
            .date-display { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="flip-clock">
            <div class="flip-unit"><span class="time-text" id="hours">00</span></div>
            <div class="colon">:</div>
            <div class="flip-unit"><span class="time-text" id="minutes">00</span></div>
            <div class="colon">:</div>
            <div class="flip-unit"><span class="time-text" id="seconds">00</span></div>
        </div>
        <div class="date-display" id="date">0000. 00. 00. SUN</div>
    </div>

    <script>
        // 무한 반복 성능 최적화를 위한 텍스트 캐싱 처리
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const dateEl = document.getElementById('date');

        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

        function updateClock() {
            const now = new Date();

            // 시간 데이터 추출 및 포맷팅 (2자리 고정)
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');

            // 날짜 데이터 포맷팅
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const day = days[now.getDay()];

            // DOM 갱신 불필요 연산 방지를 위한 값 비교 후 대입
            if (hoursEl.textContent !== hrs) hoursEl.textContent = hrs;
            if (minutesEl.textContent !== mins) minutesEl.textContent = mins;
            if (secondsEl.textContent !== secs) secondsEl.textContent = secs;
            
            const fullDateString = `${year}. ${month}. ${date}. ${day}`;
            if (dateEl.textContent !== fullDateString) dateEl.textContent = fullDateString;
        }

        // 초기 실행 후 1초 주기로 연산 수행
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
