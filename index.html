<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Flip Clock (Auto Dark Mode)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

    /* 테마별 테마 변수 정의 (노션 라이트/다크 모드 완벽 대응) */
    :root {
      --bg-color: #ffffff;
      --panel-bg: #e3e4e8;
      --text-color: #232323;
      --colon-color: #e3e4e8;
      --date-color: #232323;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;       /* 노션 다크모드 기본 배경색 */
        --panel-bg: #2b2b2b;       /* 어두운 패널 */
        --text-color: #e3e4e8;     /* 밝은 시계 글자 */
        --colon-color: #2b2b2b;    /* 어두운 콜론 */
        --date-color: #e3e4e8;     /* 다크모드 전용 화이트 톤 날짜 */
      }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      transition: background-color 0.3s ease;
    }

    /* 반응형 핵심: 노션 임베드 크기를 감지하는 메인 컨테이너 */
    .clock-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      container-type: size; /* 이 컨테이너의 높이(cqh)를 기준으로 자식들이 스케일링됨 */
    }

    /* 플립 시계 래퍼: 전체 높이의 60%를 차지하며 가로세로 비율 유지 */
    .flip-clock {
      display: flex;
      align-items: center;
      gap: 4cqh; /* 패널 사이 여백도 높이에 비례 */
      height: 60cqh;
    }

    /* 개별 플립 그룹 박스: 높이에 맞춰 가로 비율이 1:1.04로 자동 연동 */
    .flip-group {
      position: relative;
      width: 58cqh;  /* 원본 코드의 120px : 125px 비율 반영 */
      height: 60cqh;
      perspective: 200cqh; /* 원본 400px 왜곡도를 높이 비율로 조정 */
      border-radius: 6cqh;
      box-shadow: none;
    }

    .panel {
      position: absolute;
      width: 100%;
      height: 50%;
      overflow: hidden;
      background-color: var(--panel-bg);
      color: var(--text-color);
      box-sizing: border-box;
      backface-visibility: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* 내부 텍스트 폰트 크기 자동화 */
    .panel span {
      position: absolute;
      width: 100%;
      left: 0;
      height: 60cqh; /* 부모 flip-group 전체 높이와 동기화 */
      font-family: 'Black Han Sans', sans-serif;
      font-size: 36.5cqh; /* 원본 125px 중 76px 비율 계산 처리 */
      text-align: center;
    }

    .panel.top {
      top: 0;
      border-top-left-radius: 6cqh;
      border-top-right-radius: 6cqh;
      transform-origin: bottom;
    }
    .panel.top span {
      top: 0;
      line-height: 60cqh;
    }

    .panel.bottom {
      bottom: 0;
      border-bottom-left-radius: 6cqh;
      border-bottom-right-radius: 6cqh;
      transform-origin: top;
    }
    .panel.bottom span {
      bottom: 0;
      line-height: 60cqh;
    }

    .top.next { z-index: 1; }
    .bottom.current { z-index: 2; }
    .top.current { z-index: 4; }
    .bottom.next { z-index: 5; transform: rotateX(90deg); }

    .flip-group.flipping .top.current {
      animation: flipTop 0.4s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
    }
    .flip-group.flipping .bottom.next {
      animation: flipBottom 0.4s cubic-bezier(0.215, 0.61, 0.355, 1) 0.4s forwards;
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }
    @keyframes flipBottom {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    /* 콜론 영역 */
    .colon {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6cqh;
      height: 60cqh;
    }
    /* 콜론 점 크기 */
    .dot {
      width: 4cqh;
      height: 4cqh;
      background-color: var(--colon-color);
      border-radius: 1cqh;
      transition: background-color 0.3s ease;
    }

    /* 하단 날짜 영역 */
    .date-display {
      margin-top: 5cqh;
      color: var(--date-color);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 10cqh; /* 컨테이너 높이에 맞춰 가독성 최적화 */
      text-align: center;
      letter-spacing: 0.5px;
      transition: color 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="clock-container">
    <div class="flip-clock">
      <div class="flip-group" id="hours">
        <div class="panel top next"><span>00</span></div>
        <div class="panel bottom current"><span>00</span></div>
        <div class="panel top current"><span>00</span></div>
        <div class="panel bottom next"><span>00</span></div>
      </div>
      <div class="colon">
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="flip-group" id="minutes">
        <div class="panel top next"><span>00</span></div>
        <div class="panel bottom current"><span>00</span></div>
        <div class="panel top current"><span>00</span></div>
        <div class="panel bottom next"><span>00</span></div>
      </div>
      <div class="colon">
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="flip-group" id="seconds">
        <div class="panel top next"><span>00</span></div>
        <div class="panel bottom current"><span>00</span></div>
        <div class="panel top current"><span>00</span></div>
        <div class="panel bottom next"><span>00</span></div>
      </div>
    </div>
    <div class="date-display" id="date">-</div>
  </div>

  <script>
    function initClock() {
      updateClock(true);
      setInterval(() => updateClock(false), 1000);
    }

    function updateClock(isFirst) {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      
      renderFlip('hours', h, isFirst);
      renderFlip('minutes', m, isFirst);
      renderFlip('seconds', s, isFirst);
      
      renderDate(now);
    }

    function renderFlip(id, value, isFirst) {
      const group = document.getElementById(id);
      const currentTop = group.querySelector('.top.current span');
      const currentBottom = group.querySelector('.bottom.current span');
      
      if (currentTop.textContent === value) return;
      
      const nextTop = group.querySelector('.top.next span');
      const nextBottom = group.querySelector('.bottom.next span');
      
      nextTop.textContent = value;
      nextBottom.textContent = value;
      
      if (isFirst) {
        currentTop.textContent = value;
        currentBottom.textContent = value;
        return;
      }
      
      group.classList.add('flipping');
      
      setTimeout(() => {
        currentTop.textContent = value;
        currentBottom.textContent = value;
        group.classList.remove('flipping');
      }, 800);
    }

    function renderDate(dateObj) {
      const weekday = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
      const month = dateObj.toLocaleDateString('en-US', { month: 'long' });
      const day = dateObj.getDate();
      const year = dateObj.getFullYear();
      
      const formatted = `${weekday} | ${month} ${day}, ${year}`;
      const dateEl = document.getElementById('date');
      
      if (dateEl.textContent !== formatted) {
        dateEl.textContent = formatted;
      }
    }

    window.onload = initClock;
  </script>
</body>
</html>
