<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal 3D Real Flip Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            user-select: none;
            overflow: hidden;
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 플립 그룹 (상/하/회전 패널을 감싸는 컨테이너) */
        .flip-group {
            position: relative;
            width: 140px;
            height: 160px;
            perspective: 400px; /* 입체감 깊이 제어 */
        }

        /* 모든 패널의 공통 스타일 */
        .panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            background-color: #e2e2e4;
            color: #242424;
            font-size: 85px;
            font-weight: 800;
            overflow: hidden;
            border-left: 1px solid rgba(0,0,0,0.05);
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        /* 텍스트 정렬을 위한 내부 래퍼 */
        .panel-text {
            position: absolute;
            left: 0;
            width: 100%;
            height: 160px; /* 전체 카드 높이 기준 */
            display: flex;
            justify-content: center;
        }

        /* 상단 영역 전용 정렬 */
        .top-half {
            top: 0;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }
        .top-half .panel-text {
            top: 0;
            align-items: center;
            transform: translateY(10px); /* 폰트 중앙 정렬 보정 */
        }

        /* 하단 영역 전용 정렬 */
        .bottom-half {
            bottom: 0;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .bottom-half .panel-text {
            bottom: 0;
            align-items: center;
            transform: translateY(-10px); /* 폰트 중앙 정렬 보정 */
        }

        /* 실제로 회전하는 패널 */
        .falling-panel {
            z-index: 3;
            transform-origin: bottom; /* 중앙선(바닥)을 축으로 회전 */
            backface-visibility: hidden; /* 뒤집혔을 때 뒷면 숨김 */
        }

        /* 콜론(:) 디자인 */
        .colon {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 4px;
        }
        .colon span {
            width: 10px;
            height: 18px;
            background-color: #e2e2e4;
            border-radius: 2px;
        }

        /* 날짜 디스플레이 */
        .date-display {
            margin-top: 24px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 중앙 회전 애니메이션 */
        @keyframes flip-down {
            0% {
                transform: rotateX(0deg);
            }
            100% {
                transform: rotateX(-90deg); /* 90도만 직각으로 접히며 떨어짐 (플랫 감성) */
            }
        }

        .animate {
            animation: flip-down 0.2s ease-in forwards;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <!-- 시 -->
        <div class="flip-group" id="group-hours">
            <div class="panel top-half"><div class="panel-text" id="hours-top">00</div></div>
            <div class="panel bottom-half"><div class="panel-text" id="hours-bottom">00</div></div>
            <div class="panel top-half falling-panel" id="hours-flip"><div class="panel-text" id="hours-flip-text">00</div></div>
        </div>

        <div class="colon"><span></span><span></span></div>

        <!-- 분 -->
        <div class="flip-group" id="group-minutes">
            <div class="panel top-half"><div class="panel-text" id="minutes-top">00</div></div>
            <div class="panel bottom-half"><div class="panel-text" id="minutes-bottom">00</div></div>
            <div class="panel top-half falling-panel" id="minutes-flip"><div class="panel-text" id="minutes-flip-text">00</div></div>
        </div>

        <div class="colon"><span></span><span></span></div>

        <!-- 초 -->
        <div class="flip-group" id="group-seconds">
            <div class="panel top-half"><div class="panel-text" id="seconds-top">00</div></div>
            <div class="panel bottom-half"><div class="panel-text" id="seconds-bottom">00</div></div>
            <div class="panel top-half falling-panel" id="seconds-flip"><div class="panel-text" id="seconds-flip-text">00</div></div>
        </div>
    </div>

    <div class="date-display" id="date"></div>

    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        // 개별 플립 가동 함수
        function flipCard(targetId, newValue) {
            const topEl = document.getElementById(`${targetId}-top`);
            const bottomEl = document.getElementById(`${targetId}-bottom`);
            const flipEl = document.getElementById(`${targetId}-flip`);
            const flipTextEl = document.getElementById(`${targetId}-flip-text`);

            // 기존 값과 동일하면 연산 패스
            if (bottomEl.textContent === newValue) return;

            // 1. 회전할 패널에 현재 가만히 있는 상단 글자 주입
            flipTextEl.textContent = topEl.textContent;
            
            // 2. 뒤 배경이 될 하단 패널에 새로운 숫자 미리 깔아두기
            bottomEl.textContent = newValue;

            // 3. 네가 사용한 리플로우 기법 접목해서 애니메이션 재트리거
            flipEl.classList.remove('animate');
            void flipEl.offsetWidth; 
            flipEl.classList.add('animate');

            // 4. 애니메이션(90도 꺾임) 끝나는 타이밍에 맞춰 상단 패널 글자도 교체
            setTimeout(() => {
                topEl.textContent = newValue;
            }, 200);
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // 시, 분, 초 각각 독립적으로 플립 판단 제어
            flipCard('hours', hours);
            flipCard('minutes', minutes);
            flipCard('seconds', seconds);

            // 날짜 업데이트
            const dateStr = `${days[now.getDay()]} | ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
            const dateEl = document.getElementById('date');
            if (dateEl.textContent !== dateStr) dateEl.textContent = dateStr;
        }

        // 초기 구동 및 주기 타이머 등록
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
